<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Anonymous pose review</title>
<style>
:root{color-scheme:light;font-family:system-ui,-apple-system,sans-serif;background:#f7f8fb;color:#263238}*{box-sizing:border-box}body{margin:0;padding:18px}header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:0 auto 14px;max-width:1240px}h1{font-size:18px;margin:0}.badge{font-size:12px;padding:5px 9px;border-radius:999px;background:#e8eaf6;color:#3949ab}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1240px;margin:auto}.panel{background:white;border:1px solid #dfe3ea;border-radius:14px;min-height:360px;overflow:hidden}.panel h2{font-size:16px;margin:12px 16px 0}.panel svg{display:block;width:100%;height:330px}.note{max-width:1240px;margin:14px auto 0;font-size:13px;color:#546e7a;line-height:1.55}.legend span{display:inline-flex;align-items:center;margin-right:14px}.dot{width:10px;height:10px;border-radius:50%;margin-right:5px}@media(max-width:760px){body{padding:10px}.grid{grid-template-columns:1fr}.panel{min-height:320px}.panel svg{height:300px}}
</style>
</head>
<body>
<header><h1>Anonymous four-view review</h1><span class="badge">pose-9d2a7e</span></header>
<div class="grid" id="grid"></div>
<div class="note"><div class="legend"><span><i class="dot" style="background:#2e7d32"></i>declared floor support</span><span><i class="dot" style="background:#f9a825"></i>declared body contact</span></div>目標名や説明は表示していません。正面・側面・上面・斜めの形だけから姿勢を評価してください。</div>
<script>
const views={front:{project:p=>[p[0],p[1]],bounds:[-.75,.75,-.02,1.15]},side:{project:p=>[p[2],p[1]],bounds:[-.15,.65,-.02,1.15]},top:{project:p=>[p[0],p[2]],bounds:[-.75,.75,-.15,.65]},iso:{project:p=>[(p[0]-p[2])/Math.SQRT2,(-.35*p[0]+p[1]-.35*p[2])/Math.sqrt(1.245)],bounds:[-.8,.8,-.05,1.2]}};
const parents=[-1,0,1,2,3,4,5,6,3,8,9,10,3,12,13,14,0,16,17,18,0,20,21,22];
const names=["Hips","Spine1","Spine2","Chest","Neck1","Neck2","Head","HeadEnd","LeftShoulder","LeftArm","LeftForeArm","LeftHand","RightShoulder","RightArm","RightForeArm","RightHand","LeftLeg","LeftShin","LeftFoot","LeftToeBase","RightLeg","RightShin","RightFoot","RightToeBase"];
const idx=Object.fromEntries(names.map((n,i)=>[n,i])),NS="http://www.w3.org/2000/svg";
function el(tag,attrs={}){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function segDist(a,b,c,d){const sub=(x,y)=>x.map((v,i)=>v-y[i]),dot=(x,y)=>x.reduce((s,v,i)=>s+v*y[i],0),add=(x,y)=>x.map((v,i)=>v+y[i]),mul=(x,s)=>x.map(v=>v*s),u=sub(b,a),v=sub(d,c),w=sub(a,c),A=dot(u,u),B=dot(u,v),C=dot(v,v),D=dot(u,w),E=dot(v,w),den=A*C-B*B;let s=den<1e-12?0:(B*E-C*D)/den,t=den<1e-12?E/C:(A*E-B*D)/den;s=Math.max(0,Math.min(1,s));t=Math.max(0,Math.min(1,t));return[add(a,mul(u,s)),add(c,mul(v,t))]}
function draw(viewName,pose){const cfg=views[viewName],box=document.createElement("section");box.className="panel";const title=document.createElement("h2");title.textContent=viewName;box.appendChild(title);const svg=el("svg",{viewBox:"0 0 560 330","aria-label":viewName}),[xmin,xmax,ymin,ymax]=cfg.bounds,map=q=>[45+(q[0]-xmin)/(xmax-xmin)*470,300-(q[1]-ymin)/(ymax-ymin)*270];if(viewName!=="top"){const a=map([xmin,0]),b=map([xmax,0]);svg.appendChild(el("line",{x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke:"#90a4ae","stroke-width":3}))}for(const y of[ymin+(ymax-ymin)/3,ymin+2*(ymax-ymin)/3]){const a=map([xmin,y]),b=map([xmax,y]);svg.appendChild(el("line",{x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke:"#f0f2f5"}))}for(const[joint,rx0,ry0,fill]of[["Hips",.16,.18,"#8d6e6340"],["Chest",.19,.20,"#78909c40"],["Head",.10,.12,"#90a4ae40"]]){const c=map(cfg.project(pose[idx[joint]]));let rx=rx0,ry=ry0;if(viewName==="side")rx=joint==="Head"?.10:.12;if(viewName==="top")ry=joint==="Head"?.10:.12;if(viewName==="iso"){rx*=.9;ry*=.9}svg.appendChild(el("ellipse",{cx:c[0],cy:c[1],rx:rx*470/(xmax-xmin),ry:ry*270/(ymax-ymin),fill,stroke:"#78909c","stroke-width":1.5}))}parents.forEach((p,i)=>{if(p<0)return;const a=map(cfg.project(pose[p])),b=map(cfg.project(pose[i])),stroke=names[i].startsWith("Left")?"#1976d2":names[i].startsWith("Right")?"#d32f2f":"#7e57c2";svg.appendChild(el("line",{x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke,"stroke-width":7,"stroke-linecap":"round"}))});pose.forEach((p,i)=>{const q=map(cfg.project(p)),fill=names[i].startsWith("Left")?"#1976d2":names[i].startsWith("Right")?"#d32f2f":"#7e57c2";svg.appendChild(el("circle",{cx:q[0],cy:q[1],r:names[i]==="Head"?7:4.5,fill,stroke:"#fff","stroke-width":2}))});const rightKnee=[...pose[idx.RightShin]];rightKnee[1]-=.058;const rightFoot=[...pose[idx.RightFoot]];rightFoot[1]-=.04;const rightToe=[...pose[idx.RightToeBase]];rightToe[1]-=.03;const floor=[[pose[idx.Hips][0],pose[idx.Hips][1]-.18,pose[idx.Hips][2]],rightKnee,rightFoot,rightToe],body=segDist(pose[idx.LeftShin],pose[idx.LeftFoot],pose[idx.RightShin],pose[idx.RightFoot]);for(const p of floor){const q=map(cfg.project(p));svg.appendChild(el("circle",{cx:q[0],cy:q[1],r:5,fill:"#2e7d32",stroke:"#fff","stroke-width":2}))}for(const p of body){const q=map(cfg.project(p));svg.appendChild(el("circle",{cx:q[0],cy:q[1],r:5,fill:"#f9a825",stroke:"#fff","stroke-width":2}))}box.appendChild(svg);return box}
fetch("./pose.json",{cache:"no-cache"}).then(r=>r.json()).then(data=>{const pose=data.positions[0],grid=document.querySelector("#grid");for(const v of["front","side","top","iso"])grid.appendChild(draw(v,pose))}).catch(e=>document.querySelector("#grid").textContent=e.message);
</script>
</body>
</html>
