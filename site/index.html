<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>KiMoDo Pose Viewer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header><strong>KiMoDo Pose Viewer</strong><span>3Dポーズ確認・品質レビュー</span></header>
  <main>
    <section id="viewer"></section>
    <aside>
      <label>サンプルポーズ
        <select id="pose-select">
          <optgroup label="新規・4視点確認済み">
            <option value="seiza-sit-reviewed.json">正座で丁寧に座る</option>
            <option value="knees-hugged-sit-reviewed.json">膝を抱えて座る</option>
            <option value="one-knee-vow-reviewed.json">片膝をついて誓う</option>
            <option value="ready-crouch-reviewed.json">低く構える</option>
            <option value="one-leg-celebration-reviewed.json">片脚で喜ぶ</option>
            <option value="proud-hero-reviewed.json">胸を張って得意げ</option>
          </optgroup>
          <optgroup label="既存サンプル">
            <option value="happy-wave-pose.json">手を振って喜ぶ</option>
            <option value="joyful-cheer.json">両手を上げて喜ぶ</option>
            <option value="floor-sit-relaxed.json">地面に座る・リラックス</option>
            <option value="cross-legged-sit.json">あぐらで座る</option>
            <option value="kneeling-greeting.json">片膝で挨拶</option>
            <option value="surprised-recoil.json">驚いてのけぞる</option>
          </optgroup>
        </select>
      </label>
      <button id="sample">選択したポーズを表示</button>
      <label class="file">ポーズJSONを開く<input id="file" type="file" accept=".json,application/json"></label>
      <label class="file">骨格JSONを開く<input id="rig-file" type="file" accept=".json,application/json"></label>
      <div class="views">
        <button data-view="iso">斜め</button><button data-view="front">正面</button>
        <button data-view="side">側面</button><button data-view="top">上</button>
      </div>
      <p id="description"></p>
      <p id="quality"></p>
      <p id="status">読み込み中…</p>
      <p class="hint">緑の点はJSONで指定した支持・接触点です。骨盤と胸郭は半透明の簡易ボリュームで表示します。URLの <code>?pose=ファイル名</code> から各ポーズを直接開けます。</p>
      <p class="hint">骨格JSONは kimodo_dump_skeleton_meta.py の出力をそのまま読めます。ドラッグで回転、ピンチまたはホイールで拡大縮小。JSONは端末内だけで処理します。</p>
    </aside>
  </main>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js"}}</script>
  <script type="module" src="./app.js"></script>
</body>
</html>
